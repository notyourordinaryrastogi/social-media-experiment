<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
    body {
        margin: 0;
        font-family: "Segoe UI";
        height: 100vh;
        display: flex;
    }

    .left-half {
        width: 50%;
        background-image: url("/static/images/Sitephotomain.png");
        background-size: cover;
        background-position: center;
    }

    .right-half {
        width: 50%;
        position: relative;
        background-color: #ffffff;
        font-family: "Comic Sans MS"; /* enforce everywhere */
    }

    /* LOGO */
    .logo {
        position: absolute;
        top: 20px;
        right: 20px;
    }

    .logo img {
        height: 100px; /* slightly larger */
    }

    /* LOGIN BOX (ENLARGED) */
    .login-box {
        position: absolute;
        top: 50%;
        right: 10%;
        transform: translateY(-50%);

        width: 300px;              /* increased width */
        padding: 40px;             /* more spacing */
        border-radius: 12px;

        background: rgba(240, 240, 240, 0.95);
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);

        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        font-family: "Comic Sans MS";
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;

        font-size: 16px;
        font-family: "Comic Sans MS"; /* ensures Comic Sans */
        cursor: pointer;

        border: none;
        border-radius: 6px;
        background-color: #4CAF50;
        color: white;
    }

    button:hover {
        background-color: #45a049;
    }

    .container {
        max-width: 500px;
        margin: 60px auto;
        padding: 20px;
        background: rgba(255,255,255,0.95);
        border-radius: 12px;
    }


    @media (max-width: 600px) {

        body {
            font-size: 15px;
        }

        .container {
            margin: 20px 10px;
            padding: 15px;
            border-radius: 10px;
        }

        h1, h2, h3 {
            font-size: 18px;
            line-height: 1.3;
        }

        p {
            font-size: 14px;
            line-height: 1.4;
        }

        input, select, button {
            width: 100%;
            font-size: 16px;
            padding: 12px;
            margin-top: 10px;
        }

        label {
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            font-size: 16px;
            padding: 12px;
            margin-top: 10px;
        }
    }
</style>

<body>

    <div class="left-half"></div>

    <div class="right-half">

        <div class="logo">
            <img src="/static/images/site_logo.png">
        </div>

        <div class="login-box">

    {% if condition == "real" %}
        <h2>Use your real name</h2>
        <p>Please enter your real name to continue.</p>

        <form method="POST">
            <input type="text" name="username" placeholder="Enter your real name" required>
            <button type="submit">Start</button>
        </form>

    {% elif condition == "pseudo" %}
        <h2>Create a username</h2>
        <p>Use a name that does not reveal your identity.</p>

        <form method="POST">
            <input type="text" name="username" placeholder="Enter a pseudonym" required>
            <button type="submit">Start</button>
        </form>

    {% elif condition == "anonymous" %}
        <h2>Anonymous Mode</h2>
        <p>You will remain anonymous.</p>

        <form method="POST">
            <input type="hidden" name="username" value="Anonymous">
            <button type="submit">Continue</button>
        </form>
    {% endif %}

        </div>

    </div>

</body>
